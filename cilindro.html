<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cilindro - Geometria 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="cilindro">
    <header class="header-discreto">
        <span class="site-titulo-mini">Geometria 3D Interativa - Desenvolvido pelo Professor Jeiverson Christian</span>
        <a href="https://www.youtube.com/@jeiversonchristian" target="_blank" class="yt-mini">YouTube: @jeiversonchristian</a>
    </header>

    <nav class="nav-subpaginas">
        <a href="index.html">Início</a>
        <a href="cubo.html">Cubo</a>
        <a href="bloco.html">Bloco Retangular</a>
    </nav>

    <main class="container-principal">
        <div class="titulo-figura"><h2>Cilindro</h2></div>
        <div class="conteudo-layout">
            <div class="area-3d">
                <div id="canvas-container"></div>
                <div class="painel-interacao">
                    <div class="grupo-botoes"><span>Zoom</span><div class="linha-btn"><button id="btn-zoom-in" class="btn-ui">+</button><button id="btn-zoom-out" class="btn-ui">-</button></div></div>
                    <div class="grupo-botoes"><span>Rotacionar</span><div class="linha-btn"><button id="btn-rot-up" class="btn-ui">↑</button></div><div class="linha-btn"><button id="btn-rot-left" class="btn-ui">←</button><button id="btn-rot-down" class="btn-ui">↓</button><button id="btn-rot-right" class="btn-ui">→</button></div></div>
                    <button id="btn-reset-cam" class="btn-ui btn-reset">Resetar</button>
                </div>
            </div>

            <div class="area-controles">
                <div class="control-group"><label>Raio (R): <span id="val-r">-- cm</span></label><input type="range" id="input-r" min="1" max="6" step="0.5"></div>
                <div class="control-group"><label>Altura (H): <span id="val-h">-- cm</span></label><input type="range" id="input-h" min="2" max="12" step="0.5"></div>
                
                <div class="control-group">
                    <label>Cor Geral da Figura:</label>
                    <select id="cor-geral">
                        <option value="#facc15">Amarelo</option>
                        <option value="#38bdf8">Azul</option>
                        <option value="#ef4444">Vermelho</option>
                        <option value="#22c55e">Verde</option>
                        <option value="transparente">Transparente</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Cores por Parte (Sobrepõe a Geral):</label>
                    <div class="grid-faces">
                        <div>Lateral: <select id="cil-lateral" class="sel-face"><option value="padrao">Padrão</option><option value="#facc15">Amarelo</option><option value="#38bdf8">Azul</option><option value="#ef4444">Vermelho</option><option value="#22c55e">Verde</option><option value="transparente">Transp.</option></select></div>
                        <div>Topo (Tampa): <select id="cil-topo" class="sel-face"><option value="padrao">Padrão</option><option value="#facc15">Amarelo</option><option value="#38bdf8">Azul</option><option value="#ef4444">Vermelho</option><option value="#22c55e">Verde</option><option value="transparente">Transp.</option></select></div>
                        <div>Base (Fundo): <select id="cil-base" class="sel-face"><option value="padrao">Padrão</option><option value="#facc15">Amarelo</option><option value="#38bdf8">Azul</option><option value="#ef4444">Vermelho</option><option value="#22c55e">Verde</option><option value="transparente">Transp.</option></select></div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Valor de π (Pi):</label>
                    <select id="select-pi">
                        <option value="simbolo">Símbolo (π)</option>
                        <option value="3">3</option>
                        <option value="3.14">3.14</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Exibição de Elementos:</label>
                    <select id="ver-elementos">
                        <option value="tudo-claro">Contorno completo</option>
                        <option value="apenas-base">Ocultar Malha Externa</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Textos na Figura (R, H):</label>
                    <select id="ver-medidas">
                        <option value="mostrar">Mostrar R e H</option>
                        <option value="esconder">Esconder Textos</option>
                    </select>
                    <div id="info-medidas-texto" class="texto-medida-figura"></div>
                </div>

                <div class="calculos-box"><p id="calc-area"></p><p id="calc-volume"></p></div>
                <div class="legenda"><strong>Legenda:</strong><br>R = Raio da Base | H = Altura<br>A<sub>b</sub> = Área da Base | V = Volume</div>
            </div>
        </div>
    </main>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/" } }</script>
    <script type="module" src="script.js"></script>
</body>
</html>
